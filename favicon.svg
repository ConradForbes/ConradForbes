<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer dashed halo -->
  <circle cx="16" cy="16" r="14" stroke="#E8430C" stroke-width="0.75" stroke-dasharray="2 3.5" opacity="0.6"/>
  <!-- Inner solid ring -->
  <circle cx="16" cy="16" r="10.5" stroke="#E8430C" stroke-width="0.8" opacity="0.7"/>
  <!-- CF centred within inner circle (x+1 compensates for trailing letter-spacing) -->
  <text x="15.5" y="20"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="10"
        font-weight="400"
        letter-spacing="2"
        fill="#E8430C">CF</text>
</svg>
